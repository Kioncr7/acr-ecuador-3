<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Quiniela 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <span class="tri-text">A.C.R</span>
                <span class="year-badge">PRODUCTIONS</span>
            </div>
            <button class="hamburger" id="hamburger-btn">
                <span></span><span></span><span></span>
            </button>
            <nav class="nav-menu" id="nav-menu">
                <a href="index.html">Inicio</a>
                <a href="registro.html" class="active">Registrarse</a>
                <a href="predicciones.html">Fase de Grupos</a>
                <a href="road-to-the-final.html">Road to the Final</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="register-container">
            <div class="form-panel">
                <h2>Tu <span>Predicción de Eliminatorias</span></h2>
                
                <form id="prediction-form">
                    <div class="form-group">
                        <label for="user-name"><i class="fa-solid fa-user"></i> Tu Nombre Completo</label>
                        <input type="text" id="user-name" required placeholder="Escribe tu nombre aquí..." autocomplete="off">
                    </div>

                    <div class="form-group">
                        <label><i class="fa-solid fa-soccer-ball" style="color: var(--primary-green); margin-right: 8px;"></i> Predice el partido de 16vos de La Tri</label>
                        <div class="matches-container">
                            <div class="match-card">
                                <div class="team-side text-left">
                                    <img src="https://flagcdn.com/w40/ec.png" alt="Ecuador">
                                    <span>ECU</span>
                                </div>
                                <div class="score-inputs">
                                    <input type="number" id="score-ecu-f2" min="0" placeholder="0" required>
                                    <span class="vs-text">-</span>
                                    <input type="number" id="score-mex-f2" min="0" placeholder="0" required>
                                </div>
                                <div class="team-side text-right">
                                    <span>MEX</span>
                                    <img src="https://flagcdn.com/w40/mx.png" alt="México">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-group" style="margin-top: 12px;">
                        <label><i class="fa-solid fa-pen-to-square" style="color: var(--primary-green); margin-right: 8px;"></i> Soñemos con una actualizacion y en un futuro pronostico de 8vos</label>
                        <p style="color: var(--text-muted); margin-top: 8px; font-size: 0.95rem;">SI SE PUEDE atte: A.c.r.productions.</p>
                    </div>

                    <button type="submit" class="btn-submit">Registrar Pronóstico Ecuador vs México</button>
                </form>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="video-modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modal-team-title">
                    <img src="" id="modal-team-flag" alt="Bandera">
                    <span id="modal-team-name">Selección</span>
                </div>
                <button class="modal-close" id="close-modal-btn"><i class="fa-solid fa-circle-xmark"></i></button>
            </div>
            <div class="modal-body">
                <iframe id="modal-iframe" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <div class="modal-footer">
                <p id="modal-team-quote"></p>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-container">
            <div class="footer-socials">
                <a href="https://mail.google.com/mail/?view=cm&fs=1&to=a.c.r.temas@gmail.com" target="_blank">a.c.r.temas@gmail.com</a>
                <a href="https://www.tiktok.com/@a.c.r_kion?_r=1&_t=ZS-94DreEliyz1" target="_blank" title="TikTok"><i class="fa-brands fa-tiktok"></i></a>
                <a href="https://www.instagram.com/a.c.r_kion?igsh=eThkNmt4MDR2czUw" target="_blank" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
            </div>
            <p class="footer-copyright">&copy; 2026 A.C.R Productions - Todos los derechos reservados.</p>
        </div>
    </footer>

    <script type="module" src="script.js?v=20260617"></script>
</body>
</html>
